# Fly config. `fly launch --no-deploy` then `fly volumes create betty_data --size 1`,
# then `fly deploy`. The volume keeps the SQLite file across restarts.
app = "betty-r5jqpq"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  BETTY_DB = "/data/betty.db"
  BETTY_LEAGUE_ID = "1312071038443454464"
  BETTY_SEASON = "2026"
  BETTY_MARKET_WEEK = "1"     # board shows week 1
  # BETTY_WEEK unset => preseason (period 0, one-time $1k lump).
  # On boot the server self-seeds an empty board (ingest + league members).

[mounts]
  source = "betty_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1   # keep 1 up so the settle/freeze loop runs

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
